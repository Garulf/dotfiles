# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'xamut/tmux-weather'
set -g @plugin 'vascomfnunes/tmux-clima'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'omerxx/tmux-sessionx'


# General
set-option -sa terminal-overrides ",xterm*:Tc"
set -as terminal-overrides ',*:Ms=\E]52;%p1%s;%p2%s\007'
set -g default-terminal "screen-256color"
set -g set-clipboard on

set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set-option -g status-position top
set-option -g lock-command "vlock -c"
set -g lock-after-time 910 # Seconds; 0 = never

# reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded..."

# omerxx/tmux-floax
# set -g @floax-bind "M-`"
set -g @floax-window-bg '#1e1e2f'

# xamut/tmux-weather
set-option -g @tmux-weather-units "u"
set-option -g @tmux-weather-format "%c%t"
set-option -g @tmux-weather-location "philadelphia"

# catppuccin/tmux
set -g @catppuccin_flavour 'mocha'
set -g @catppuccin_window_status_style "basic"
set -g @catppuccin_window_text " #{?window_bell_flag,󰂞 ,}#{?#{==:#{pane_current_command},ssh},🖧 #(ps --ppid #{pane_pid} -o args= 2>/dev/null | grep -m1 ^ssh | sed 's/.* //'),#{b:pane_current_path}}"
set -g @catppuccin_window_current_text " #{?#{==:#{pane_current_command},ssh},🖧 #(ps --ppid #{pane_pid} -o args= 2>/dev/null | grep -m1 ^ssh | sed 's/.* //'),#{b:pane_current_path}}"

# tmux-plugins/tmux-continuum
set -g @continuum-restore 'on'
set -g @continuum-save-interval '2'

# tmux-plugins/tmux-resurrect
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes '"~nvim->v *" "~claude"'
set -g @resurrect-dir '~/.tmux/resurrect'
resurrect_dir="$HOME/.tmux/resurrect"
set -g @resurrect-dir $resurrect_dir
set -g @resurrect-hook-post-save-all "sed 's/--cmd[^ ]* [^ ]* [^ ]*//g' $resurrect_dir/last | sponge $resurrect_dir/last"


# Keybinds
bind -n M-l lock-session

# Nested tmux: F12 toggles key passthrough to inner session
bind -n F12 \
  set prefix None \;\
  set key-table off \;\
  set status-style "fg=colour245,bg=colour238" \;\
  refresh-client -S

bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-style \;\
  refresh-client -S

# vi-mode
set-window-option -g mode-keys vi

# Split panes in cwd
bind '"' split-window -v -c '#{pane_current_path}'
bind '%' split-window -h -c '#{pane_current_path}'

# Window
bind-key -n M-1 if-shell 'tmux select-window -t :1' '' 'new-window -t :1 -c "#{pane_current_path}"'
bind-key -n M-2 if-shell 'tmux select-window -t :2' '' 'new-window -t :2 -c "#{pane_current_path}"'
bind-key -n M-3 if-shell 'tmux select-window -t :3' '' 'new-window -t :3 -c "#{pane_current_path}"'
bind-key -n M-4 if-shell 'tmux select-window -t :4' '' 'new-window -t :4 -c "#{pane_current_path}"'
bind-key -n M-5 if-shell 'tmux select-window -t :5' '' 'new-window -t :5 -c "#{pane_current_path}"'
bind-key -n M-6 if-shell 'tmux select-window -t :6' '' 'new-window -t :6 -c "#{pane_current_path}"'
bind-key -n M-7 if-shell 'tmux select-window -t :7' '' 'new-window -t :7 -c "#{pane_current_path}"'
bind-key -n M-8 if-shell 'tmux select-window -t :8' '' 'new-window -t :8 -c "#{pane_current_path}"'
bind-key -n M-9 if-shell 'tmux select-window -t :9' '' 'new-window -t :9 -c "#{pane_current_path}"'
bind-key -n M-0 if-shell 'tmux select-window -t :0' '' 'new-window -t :0 -c "#{pane_current_path}"'

# Panes
bind-key -n M-'!' if-shell 'tmux join-pane -h -t :1' '' 'break-pane -t :1'
bind-key -n M-'@' if-shell 'tmux join-pane -h -t :2' '' 'break-pane -t :2'
bind-key -n M-'#' if-shell 'tmux join-pane -h -t :3' '' 'break-pane -t :3'
bind-key -n M-'$' if-shell 'tmux join-pane -h -t :4' '' 'break-pane -t :4'
bind-key -n M-'%' if-shell 'tmux join-pane -h -t :5' '' 'break-pane -t :5'
bind-key -n M-'^' if-shell 'tmux join-pane -h -t :6' '' 'break-pane -t :6'
bind-key -n M-'&' if-shell 'tmux join-pane -h -t :7' '' 'break-pane -t :7'
bind-key -n M-'*' if-shell 'tmux join-pane -h -t :8' '' 'break-pane -t :8'
bind-key -n M-'(' if-shell 'tmux join-pane -h -t :9' '' 'break-pane -t :9'
bind-key -n M-')' if-shell 'tmux join-pane -h -t :0' '' 'break-pane -t :0'

bind-key -n M-'x' kill-pane
bind-key -n M-'X' kill-window
bind-key -n M-'K' confirm kill-server

# passthrough: sends the prefix keystroke into the pane instead of the outer
# tmux acting on it, so a nested tmux session can receive its own prefix
bind-key -n C-a send-prefix

bind -n M-Up select-pane -U
bind -n M-Down select-pane -D
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R

bind -n M-S-Up swap-pane -U
bind -n M-S-Down swap-pane -D

# toggle zoom
bind -n M-f run 'tmux resize-pane -Z'

# shrink pane
bind -n M-- resize-pane -L 5
# expand pane
bind -n M-= resize-pane -R 5

# popup terminal (per-window scratch session, named scratch-<session>-<window_index>)
# display-popup's command arg doesn't expand #{} formats; run-shell does,
# so we use it to pre-expand values before calling display-popup
bind -n M-U if-shell -F '#{m/ri:^scratch-,#{session_name}}' {
    detach-client
  } {
    run-shell "tmux display-popup -E -c '#{client_name}' -xC -yC -w60% -h60% 'if tmux has-session -t scratch-#{session_name}-#{window_index} 2>/dev/null; then exec tmux attach-session -t scratch-#{session_name}-#{window_index}; else tmux new-session -d -c \"#{pane_current_path}\" -s scratch-#{session_name}-#{window_index} && tmux set-option -t scratch-#{session_name}-#{window_index} status off && exec tmux attach-session -t scratch-#{session_name}-#{window_index}; fi'"
}

# auto-kill per-window scratch session when its parent window closes
set-hook -g window-unlinked 'run-shell "tmux kill-session -t scratch-#{session_name}-#{window_index} 2>/dev/null; true"'

# Send Android notification on bell (requires Termux:API)
set -g bell-action any
set-hook -g alert-bell 'run-shell "termux-notification -t \"Bell\" -c \"#{session_name}:#{window_name}\" 2>/dev/null; true"'

set -g popup-border-style "fg=#0188b4"

bind -T popup M-` detach
bind -T popup C-o copy-mode
bind -T popup M-c new-window -c '#{pane_current_path}'
bind -T popup M-n next-window
bind -T popup M-m previous-window
bind -T popup M-'x' kill-pane

bind -T popup M-L run 'tmux move-window -a -t $TMUX_PARENT_SESSION:{next}'

# bind -n M-` display-popup -h 60% -w 80% -E /home/garulf/scripts/show-tmux-popup.sh
# bind-key -T prefix x confirm-before -p "kill-pane #P? (y/n)" kill-pane
bind-key C-c display-popup -E -w 80 -h 30 "/usr/local/bin/claude-tmux"
bind-key -T prefix x kill-pane


set -g @yank_with_mouse off

run '~/.tmux/plugins/tpm/tpm'

# Override tmux-yank: use OSC 52 via tmux's internal clipboard (works over SSH)
bind-key -T root MouseDrag1Pane if-shell -F "#{mouse_any_flag}" "send-keys -M" "copy-mode -M"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X stop-selection
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X stop-selection
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment COLORTERM

# Highlight status bar when prefix is active (overrides catppuccin's static style)
set -g status-style "bg=#{?client_prefix,#{@thm_red},#{@_ctp_status_bg}},fg=#{@thm_fg}"
